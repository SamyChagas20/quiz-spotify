services:
  - type: web
    name: quiz-spotify
    runtime: node
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        sync: false